<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <!-- ÜST BİLGİ (AVM'lerdeki bilgilendirme çubuğu) -->
    <div class="bg-[#002f6c] text-white text-[10px] py-1 text-center font-bold tracking-widest uppercase">
        Açılış-Kapanış: 10:00 - 22:00 | Bugün açık
    </div>

    <!-- ANA NAVİGASYON -->
    <nav class="sticky top-0 z-[100] glass-nav border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            <h1 class="text-3xl font-black text-[#002f6c]">ARMADA</h1>
            <div class="hidden md:flex gap-10 text-[13px] font-bold uppercase tracking-wide">
                <a href="#" class="hover:text-[#e30613] transition-all">Mağazalar</a>
                <a href="#" class="hover:text-[#e30613] transition-all">Yeme-İçme</a>
                <a href="#" class="hover:text-[#e30613] transition-all">Etkinlikler</a>
                <a href="#" class="hover:text-[#e30613] transition-all">Kampanyalar</a>
            </div>
            <button class="bg-black text-white px-8 py-3 rounded-full text-xs font-bold hover:bg-[#e30613] transition-all">ZİYARET PLANLA</button>
        </div>
    </nav>

    <!-- HERO: BÜYÜK GÖRSEL ALANI -->
    <section class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 h-[500px]">
            <div class="md:col-span-3 rounded-3xl bg-slate-800 overflow-hidden relative shadow-2xl">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent p-12 flex flex-col justify-end text-white">
                    <span class="bg-[#e30613] w-fit px-4 py-1 text-[10px] font-bold rounded mb-4">GÜNCEL</span>
                    <h2 class="text-5xl font-extrabold mb-2">Yaz Festivali Başladı</h2>
                    <p class="text-lg opacity-80">Armada’nın eşsiz atmosferinde yaza merhaba deyin.</p>
                </div>
            </div>
            <div class="flex flex-col gap-4">
                <div class="flex-1 rounded-3xl bg-gray-200 p-6 flex flex-col justify-between shadow-lg">
                    <h3 class="font-bold">Haftanın Filmleri</h3>
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
                <div class="flex-1 rounded-3xl bg-[#002f6c] text-white p-6 flex flex-col justify-between shadow-lg">
                    <h3 class="font-bold">Ulaşım & Otopark</h3>
                    <i class="fa-solid fa-car"></i>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
