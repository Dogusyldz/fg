<!DOCTYPE html>
<html lang="tr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-[#f8f9fa]">

    <!-- HEADER: Armada Laciverti ve Derin Gölge -->
    <header class="sticky top-0 z-[100] bg-white/70 backdrop-blur-2xl border-b border-blue-900/10 shadow-xl shadow-blue-900/5">
        <nav class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="text-3xl font-black tracking-tighter text-[#002f6c]">ARMADA</h1>
            <div class="flex gap-8 text-sm font-bold text-[#002f6c]">
                <a href="#" class="hover:text-red-600 transition-colors">Mağazalar</a>
                <a href="#" class="hover:text-red-600 transition-colors">Etkinlikler</a>
                <a href="#" class="bg-[#e30613] text-white px-8 py-3 rounded-2xl shadow-lg shadow-red-500/30 hover:bg-red-700 transition-all active:scale-95">İletişim</a>
            </div>
        </nav>
    </header>

    <!-- HERO BÖLÜMÜ: Daha Derin Gölge -->
    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="relative rounded-[2.5rem] overflow-hidden shadow-[0_20px_50px_rgba(0,47,108,0.3)] h-96 flex items-end p-12 bg-[#002f6c]">
            <div class="absolute inset-0 bg-gradient-to-t from-[#002f6c] to-transparent opacity-80"></div>
            <div class="relative z-10 text-white">
                <h2 class="text-5xl font-extrabold mb-4">Armada'da Yaz</h2>
                <p class="text-xl text-blue-100">Yepyeni koleksiyonlar ve özel etkinlikler sizi bekliyor.</p>
            </div>
        </div>

        <!-- KARTLAR: Belirgin Gölge ve Cam Etkisi -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
            <div class="glass-card p-10 rounded-[2rem] shadow-[0_15px_35px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_40px_rgba(0,47,108,0.15)] transition-all">
                <i class="fa-solid fa-shop text-[#e30613] text-3xl mb-6"></i>
                <h3 class="font-bold text-xl text-[#002f6c]">Mağazalar</h3>
                <p class="text-slate-600 text-sm mt-2 leading-relaxed">Aradığınız markalar tek çatı altında.</p>
            </div>
            <div class="glass-card p-10 rounded-[2rem] shadow-[0_15px_35px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_40px_rgba(0,47,108,0.15)] transition-all">
                <i class="fa-solid fa-calendar-days text-[#e30613] text-3xl mb-6"></i>
                <h3 class="font-bold text-xl text-[#002f6c]">Etkinlikler</h3>
                <p class="text-slate-600 text-sm mt-2 leading-relaxed">Kültür ve sanatın kalbi burada atıyor.</p>
            </div>
            <div class="glass-card p-10 rounded-[2rem] shadow-[0_15px_35px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_40px_rgba(0,47,108,0.15)] transition-all">
                <i class="fa-solid fa-location-dot text-[#e30613] text-3xl mb-6"></i>
                <h3 class="font-bold text-xl text-[#002f6c]">Ulaşım</h3>
                <p class="text-slate-600 text-sm mt-2 leading-relaxed">Kolay ulaşım, geniş otopark alanı.</p>
            </div>
        </div>
    </main>

</body>
</html>
