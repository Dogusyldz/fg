<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="text-white antialiased">

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-auto lg:h-[600px]">
            
            <!-- Ana Büyük Kart -->
            <div class="lg:col-span-2 glass-card rounded-[2rem] p-12 flex flex-col justify-end relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-t from-rose-500/10 to-transparent"></div>
                <h2 class="text-5xl lg:text-7xl font-bold tracking-tighter mb-4 relative z-10">Sıla Sak<br>Beauty Center</h2>
                <p class="text-lg text-stone-400 max-w-sm relative z-10">Parmak uçlarınızdan zarafete açılan kapı. Profesyonel dokunuşlarla tanışın.</p>
            </div>

            <!-- Sağ Taraf Kartları -->
            <div class="flex flex-col gap-6">
                <!-- Sinema/Bilgi -->
                <div class="glass-card flex-1 rounded-[2rem] p-8">
                    <h3 class="text-2xl font-bold mb-2 text-rose-400">Önemli Bilgi</h3>
                    <p class="text-sm text-stone-400">Randevularımız kapora sistemi ile kesinleşmektedir. 20 dk geç kalındığında kaporanız yanmaktadır.</p>
                </div>

                <!-- Gastronomi/Hizmetler -->
                <div class="glass-card flex-1 rounded-[2rem] p-8">
                    <h3 class="text-2xl font-bold mb-2">Hizmetler</h3>
                    <ul class="text-sm text-stone-400 space-y-2">
                        <li>• Protez Tırnak</li>
                        <li>• Kalıcı Oje</li>
                        <li>• İpek Kirpik</li>
                    </ul>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
