<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulgen Beauty Center | Eskişehir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ulgenPink: '#e85c8d', 
                        ulgenGold: '#d4af37', 
                        ulgenDark: '#d4497a'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff9fb; color: #4a3f42; }
        .nav-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .card-blur { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(232, 92, 141, 0.2); }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .marquee { display: flex; width: 200%; animation: scroll 20s linear infinite; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="nav-blur sticky top-0 z-50 border-b border-pink-100">
        <div class="max-w-6xl mx-auto px-8 py-4 flex justify-between items-center">
            <div class="font-bold tracking-tight text-xl">
                <span class="text-ulgenGold">ULGEN</span><span class="text-ulgenPink"> BEAUTY</span>
            </div>
            <div class="flex gap-6 text-sm font-medium text-stone-600 items-center">
                <a href="#hizmetler" class="hover:text-ulgenPink transition">Fiyatlarımız</a>
                <a href="https://www.instagram.com/ulgenbeauty/" target="_blank" class="text-ulgenPink hover:opacity-80 transition">Instagram</a>
                <a href="#randevu" class="bg-ulgenPink text-white px-5 py-2 rounded-full hover:bg-ulgenDark transition shadow-md">Randevu</a>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="py-24 text-center px-8">
        <h1 class="text-6xl font-semibold tracking-tighter mb-6 text-stone-800">Güzelliğinize <span class="text-ulgenPink">Özel</span> Dokunuş.</h1>
    </header>

    <!-- FİYATLARLA HİZMETLER -->
    <section id="hizmetler" class="max-w-3xl mx-auto px-8 py-10">
        <h2 class="text-3xl font-semibold mb-10 text-center">Hizmet & Fiyat Listesi</h2>
        <div class="space-y-4">
            <div class="card-blur p-6 rounded-2xl flex justify-between items-center">
                <span class="font-medium">Lazer Epilasyon (Tüm Vücut)</span>
                <span class="text-ulgenPink font-bold">1.500 TL</span>
            </div>
            <div class="card-blur p-6 rounded-2xl flex justify-between items-center">
                <span class="font-medium">Protez Tırnak</span>
                <span class="text-ulgenPink font-bold">950 TL</span>
            </div>
            <div class="card-blur p-6 rounded-2xl flex justify-between items-center">
                <span class="font-medium">Hydrafacial Cilt Bakımı</span>
                <span class="text-ulgenPink font-bold">1.200 TL</span>
            </div>
            <div class="card-blur p-6 rounded-2xl flex justify-between items-center">
                <span class="font-medium">İpek Kirpik</span>
                <span class="text-ulgenPink font-bold">850 TL</span>
            </div>
        </div>
    </section>

    <!-- MARKA ŞERİDİ -->
    <div class="py-10 overflow-hidden bg-white border-y border-pink-50 my-10">
        <div class="marquee gap-16 items-center">
            <span class="text-stone-300 font-bold text-lg">ESTÉE LAUDER</span>
            <span class="text-stone-300 font-bold text-lg">SEPHORA</span>
            <span class="text-ulgenPink font-bold text-lg">ULGEN BEAUTY</span>
            <span class="text-stone-300 font-bold text-lg">MAC COSMETICS</span>
            <span class="text-stone-300 font-bold text-lg">ESTÉE LAUDER</span>
        </div>
    </div>

    <!-- RANDEVU -->
    <section id="randevu" class="max-w-3xl mx-auto px-8 pb-20">
        <div class="bg-ulgenPink text-white p-8 rounded-3xl shadow-xl">
            <h3 class="text-xl font-semibold mb-6">Randevu Oluştur</h3>
            <form class="grid gap-4">
                <input type="text" id="isim" placeholder="Adınız Soyadınız" class="p-4 rounded-xl text-stone-800 w-full">
                <select id="hizmet" class="p-4 rounded-xl text-stone-800 w-full">
                    <option>Lazer Epilasyon</option>
                    <option>Protez Tırnak</option>
                    <option>Cilt Bakımı</option>
                    <option>İpek Kirpik</option>
                </select>
                <button type="button" onclick="gonder()" class="bg-white text-ulgenPink font-bold py-4 rounded-xl hover:bg-pink-50 transition">WhatsApp'tan Onay Al</button>
            </form>
        </div>
    </section>

    <script>
        function gonder() {
            const isim = document.getElementById('isim').value;
            const hizmet = document.getElementById('hizmet').value;
            const mesaj = `Merhaba, ben ${isim}. ${hizmet} randevusu hakkında bilgi almak istiyorum.`;
            window.open(`https://wa.me/905056162600?text=${encodeURIComponent(mesaj)}`, '_blank');
        }
    </script>
</body>
</html>
